<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Predição de Insuficiência Cardíaca</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
</head>
<body class="bg-light">
  <div class="container py-5">
    <div class="row justify-content-center">
      <div class="col-lg-8">
        <div class="card shadow">
          <div class="card-body">
            <h1 class="h3 mb-4 text-center">Predição de Risco Cardíaco</h1>

            <form id="predictionForm" class="row g-3">
              <div class="col-md-4">
                <label class="form-label">Idade</label>
                <input type="number" class="form-control" id="age" required>
              </div>

              <div class="col-md-4">
                <label class="form-label">Anemia</label>
                <select class="form-select" id="anaemia" required>
                  <option value="0">Não</option>
                  <option value="1">Sim</option>
                </select>
              </div>

              <div class="col-md-4">
                <label class="form-label">CPK</label>
                <input type="number" class="form-control" id="creatinine_phosphokinase" required>
              </div>

              <div class="col-md-4">
                <label class="form-label">Diabetes</label>
                <select class="form-select" id="diabetes" required>
                  <option value="0">Não</option>
                  <option value="1">Sim</option>
                </select>
              </div>

              <div class="col-md-4">
                <label class="form-label">Fração de ejeção</label>
                <input type="number" class="form-control" id="ejection_fraction" required>
              </div>

              <div class="col-md-4">
                <label class="form-label">Pressão alta</label>
                <select class="form-select" id="high_blood_pressure" required>
                  <option value="0">Não</option>
                  <option value="1">Sim</option>
                </select>
              </div>

              <div class="col-md-4">
                <label class="form-label">Plaquetas</label>
                <input type="number" class="form-control" id="platelets" required>
              </div>

              <div class="col-md-4">
                <label class="form-label">Creatinina sérica</label>
                <input type="number" step="0.01" class="form-control" id="serum_creatinine" required>
              </div>

              <div class="col-md-4">
                <label class="form-label">Sódio sérico</label>
                <input type="number" class="form-control" id="serum_sodium" required>
              </div>

              <div class="col-md-4">
                <label class="form-label">Sexo</label>
                <select class="form-select" id="sex" required>
                  <option value="0">Feminino</option>
                  <option value="1">Masculino</option>
                </select>
              </div>

              <div class="col-md-4">
                <label class="form-label">Fumante</label>
                <select class="form-select" id="smoking" required>
                  <option value="0">Não</option>
                  <option value="1">Sim</option>
                </select>
              </div>

              <div class="col-md-4">
                <label class="form-label">Tempo (dias)</label>
                <input type="number" class="form-control" id="time" required>
              </div>

              <div class="col-12 d-grid">
                <button type="submit" class="btn btn-primary">Realizar predição</button>
              </div>
            </form>

            <div id="result" class="alert mt-4 d-none"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
